name: Publish to Instagram

# Runs Sun / Tue / Thu at 17:30 UTC = 20:30 Asia/Qatar (Qatar has no daylight saving).
# You can also run it by hand from the Actions tab (with an optional dry run).
on:
  schedule:
    - cron: "30 17 * * 0,2,4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do everything except the final publish)"
        type: boolean
        default: false

permissions:
  contents: write   # lets the job commit the updated queue.json back

concurrency:
  group: ig-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish next queued post
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python publish.py --dry-run
          else
            python publish.py
          fi

      - name: Commit queue changes
        run: |
          git config user.name  "ig-autopublish"
          git config user.email "actions@github.com"
          if ! git diff --quiet -- queue.json; then
            git add queue.json
            git commit -m "Mark post as published [skip ci]"
            git push
          else
            echo "No queue changes to commit."
          fi
